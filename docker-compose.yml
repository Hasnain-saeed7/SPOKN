name: spokn

services:
  redis:
    image: redis
    container_name: spokn-redis
    volumes:
      - redis-data:/data
    networks:
      - spokn-network

  backend:
    build: ./backend
    container_name: spokn-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - spokn-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
    container_name: spokn-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - spokn-network

networks:
  spokn-network:
    driver: bridge

volumes:
  redis-data: